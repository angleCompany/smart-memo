<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body {
      width: 100%; height: 52px;
      overflow: hidden;
      background: transparent;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 52px;
      border-radius: 13px;
      background: rgba(28, 28, 30, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .toast.hide {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .icon {
      font-size: 15px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon.ok  { background: rgba(48, 209, 88, 0.2);  color: #30d158; }
    .icon.dup { background: rgba(255, 159, 10, 0.2); color: #ff9f0a; }
    .icon.err { background: rgba(255, 69, 58, 0.2);  color: #ff453a; }
    .text {
      flex: 1;
      overflow: hidden;
    }
    .label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sub {
      font-size: 11px;
      color: rgba(255,255,255,0.40);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="icon" id="icon"></div>
    <div class="text">
      <div class="label" id="label"></div>
      <div class="sub" id="sub"></div>
    </div>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    const type = p.get('type') || 'ok';   // ok | dup | err
    const label = p.get('label') || '';
    const sub = p.get('sub') || '';

    const iconMap = { ok: '✓', dup: '↩', err: '✕' };
    const toast = document.getElementById('toast');
    document.getElementById('icon').textContent = iconMap[type] || '✓';
    document.getElementById('icon').className = `icon ${type}`;
    document.getElementById('label').textContent = label;
    document.getElementById('sub').textContent = sub;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => toast.classList.add('show'));
    });
  </script>
</body>
</html>
