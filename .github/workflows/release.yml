name: Release App

on:
  push:
    tags:
      - 'v*' # v1.0.0, v1.0.1 등 v로 시작하는 태그가 푸시되면 실행됩니다.

permissions:
  contents: write # GITHUB_TOKEN에 릴리즈 생성 및 자산 업로드 권한을 부여합니다.

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --mac --config.npmRebuild=false --publish always
